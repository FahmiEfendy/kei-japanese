server {
    listen 80;
    server_name kei.fahmiefendy.dev localhost;

    # Hide nginx version in error pages and headers
    server_tokens off;

    # ─── Security Headers ───
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'self';" always;

    # ─── Restrict HTTP Methods ───
    if ($request_method !~ ^(GET|HEAD)$) {
        return 405;
    }

    # ─── Static Content ───
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ─── Static Asset Caching ───
    location ~* \.(css|js|svg)$ {
        root /usr/share/nginx/html;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(jpg|jpeg|png|gif|webp|ico)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ─── Gzip Compression ───
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1000;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml;

    # ─── Block Sensitive Files ───
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ─── Error Pages ───
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
