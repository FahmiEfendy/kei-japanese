<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD500" />
      <stop offset="100%" stop-color="#F2994A" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1A1A18" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Outer Rounded Container -->
  <rect x="16" y="16" width="480" height="480" rx="120" fill="url(#bgGrad)" />

  <!-- Inner Badge Circle -->
  <circle cx="256" cy="256" r="185" fill="#1A1A18" filter="url(#shadow)" />

  <!-- Gold Accent Ring -->
  <circle cx="256" cy="256" r="172" fill="none" stroke="#FFD500" stroke-width="8" stroke-dasharray="14 8" opacity="0.5" />

  <!-- Brand "K" Lettermark -->
  <g fill="#FFD500">
    <!-- Vertical Stem -->
    <rect x="165" y="136" width="48" height="240" rx="24" />
    <!-- Top Diagonal Arm -->
    <path d="M 195,268 L 312,148 C 324,136 344,136 356,148 C 366,158 366,176 354,188 L 250,295 Z" />
    <!-- Bottom Diagonal Arm -->
    <path d="M 238,258 L 336,362 C 348,374 348,394 336,406 C 324,418 304,416 294,402 L 195,288 Z" />
  </g>

  <!-- Cheese Sparkle Accent -->
  <path d="M 375,125 C 375,105 395,95 395,95 C 395,95 395,115 415,115 C 415,115 395,125 395,145 C 395,145 385,125 375,125 Z" fill="#FFFFFF" />
</svg>
